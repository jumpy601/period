name: line-reminder

on:
  workflow_dispatch: {}     # 由 cron-job.org 每天觸發;也可在 Actions 頁面手動觸發測試

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install firebase-admin
      - run: node scripts/line-reminder.js
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          COUPLE_UID: ${{ secrets.COUPLE_UID }}
          LINE_UID_0: ${{ secrets.LINE_UID_0 }}
          LINE_UID_1: ${{ secrets.LINE_UID_1 }}
